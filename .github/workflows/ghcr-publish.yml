name: CI and publish image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Start integration dependencies
        run: docker compose up -d

      - name: Wait for integration dependencies
        run: |
          mysql_id="$(docker compose ps -q mysql)"
          redis_id="$(docker compose ps -q redis)"
          rabbitmq_id="$(docker compose ps -q rabbitmq)"
          for attempt in {1..30}; do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' "$mysql_id")" = "healthy" ] && \
               [ "$(docker inspect --format='{{.State.Health.Status}}' "$redis_id")" = "healthy" ] && \
               [ "$(docker inspect --format='{{.State.Health.Status}}' "$rabbitmq_id")" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Stop integration dependencies
        if: always()
        run: docker compose down -v

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
