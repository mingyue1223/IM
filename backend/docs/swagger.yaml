basePath: /api/v1
definitions:
  api.ApiResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  api.acceptFriendRequestReq:
    properties:
      request_id:
        type: integer
    required:
    - request_id
    type: object
  api.acceptFriendRequestResp:
    properties:
      friend_id:
        type: integer
      user_id:
        type: integer
    type: object
  api.addMemberRequest:
    properties:
      member_id:
        type: integer
    required:
    - member_id
    type: object
  api.blockUserReq:
    properties:
      blocked_id:
        type: integer
    required:
    - blocked_id
    type: object
  api.commentMomentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  api.commentMomentResponse:
    properties:
      comment_id:
        type: integer
    type: object
  api.createGroupRequest:
    properties:
      name:
        type: string
      notice:
        type: string
    required:
    - name
    type: object
  api.createGroupResponse:
    properties:
      group_id:
        type: integer
    type: object
  api.deleteCommentResponse:
    properties:
      ok:
        type: boolean
    type: object
  api.getMomentResponse:
    properties:
      author_id:
        type: integer
      content:
        type: string
      created_at:
        description: RFC3339 格式
        type: string
      id:
        type: integer
      like_count:
        description: 点赞数
        type: integer
      liked_by_me:
        description: 当前用户是否已赞
        type: boolean
      media_urls:
        type: string
      visibility:
        type: integer
    type: object
  api.likeMomentResponse:
    properties:
      count:
        description: 最新点赞数
        type: integer
      liked:
        description: 操作后是否处于已赞状态
        type: boolean
      ok:
        type: boolean
    type: object
  api.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.loginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  api.momentFeedResponse:
    properties:
      moments:
        items:
          $ref: '#/definitions/api.getMomentResponse'
        type: array
      next_cursor:
        description: 空串表示无更多
        type: string
    type: object
  api.muteConvReq:
    properties:
      convId:
        type: string
    required:
    - convId
    type: object
  api.publishMomentRequest:
    properties:
      content:
        type: string
      media_urls:
        description: 可空的 JSON 字符串
        type: string
      visibility:
        description: 1=全部, 2=好友, 3=私密
        type: integer
    required:
    - content
    type: object
  api.publishMomentResponse:
    properties:
      moment_id:
        type: integer
    type: object
  api.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  api.refreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  api.registerRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.registerResponse:
    properties:
      user_id:
        type: integer
      username:
        type: string
    type: object
  api.rejectFriendRequestReq:
    properties:
      request_id:
        type: integer
    required:
    - request_id
    type: object
  api.revokeMsgReq:
    properties:
      convId:
        type: string
      msgId:
        type: integer
    required:
    - convId
    - msgId
    type: object
  api.sendFriendRequestReq:
    properties:
      message:
        type: string
      to_user_id:
        type: integer
    required:
    - to_user_id
    type: object
  api.sendFriendRequestResp:
    properties:
      from_user_id:
        type: integer
      request_id:
        type: integer
      status:
        type: integer
      to_user_id:
        type: integer
    type: object
  api.unblockUserReq:
    properties:
      blocked_id:
        type: integer
    required:
    - blocked_id
    type: object
  api.unlikeMomentResponse:
    properties:
      count:
        type: integer
      liked:
        type: boolean
      ok:
        type: boolean
    type: object
  api.updateGroupRequest:
    properties:
      name:
        type: string
      notice:
        type: string
    required:
    - name
    type: object
  api.updateMemberRoleRequest:
    properties:
      role:
        type: integer
    required:
    - role
    type: object
  api.updateSettingsReq:
    properties:
      msg_preview_enabled:
        type: boolean
      mute_list:
        type: string
      notification_enabled:
        type: boolean
    type: object
  api.uploadAvatarResponse:
    properties:
      file_path:
        type: string
      size:
        type: integer
      url:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: GoIM 即时通讯系统 API — 支持私聊、群聊、朋友圈动态。
  title: GoIM API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回访问令牌和刷新令牌
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.loginResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      summary: 用户登录
      tags:
      - 认证
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.refreshResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/api.ApiResponse'
      summary: 刷新令牌
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码注册新用户
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 注册成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.registerResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "409":
          description: 用户名已存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      summary: 用户注册
      tags:
      - 认证
  /avatar/{userID}:
    get:
      description: 返回用户头像图片。如果用户未设置头像，自动生成包含用户名首字母的 SVG 占位头像
      parameters:
      - description: 用户ID
        format: int64
        in: path
        name: userID
        required: true
        type: integer
      - description: 用户名（用于生成默认头像首字母）
        in: query
        name: name
        type: string
      produces:
      - image/svg+xml
      responses:
        "200":
          description: 头像图片（SVG或重定向到图片URL）
          schema:
            type: string
      summary: 获取用户头像
      tags:
      - 用户
  /friend/{friendID}:
    delete:
      consumes:
      - application/json
      description: 删除指定ID的好友关系
      parameters:
      - description: 好友ID
        format: int64
        in: path
        name: friendID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 删除好友
      tags:
      - 好友
  /friend/accept:
    post:
      consumes:
      - application/json
      description: 接受指定ID的好友申请
      parameters:
      - description: 接受信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.acceptFriendRequestReq'
      produces:
      - application/json
      responses:
        "200":
          description: 接受成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.acceptFriendRequestResp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权操作
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 申请不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 接受好友申请
      tags:
      - 好友
  /friend/block:
    post:
      consumes:
      - application/json
      description: 将指定用户加入黑名单
      parameters:
      - description: 拉黑信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.blockUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 拉黑成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "409":
          description: 已拉黑
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 拉黑用户
      tags:
      - 好友
  /friend/list:
    get:
      consumes:
      - application/json
      description: 获取当前用户的好友列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  type: object
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 获取好友列表
      tags:
      - 好友
  /friend/reject:
    post:
      consumes:
      - application/json
      description: 拒绝指定ID的好友申请
      parameters:
      - description: 拒绝信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.rejectFriendRequestReq'
      produces:
      - application/json
      responses:
        "200":
          description: 拒绝成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权操作
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 申请不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 拒绝好友申请
      tags:
      - 好友
  /friend/request:
    post:
      consumes:
      - application/json
      description: 向指定用户发送好友申请
      parameters:
      - description: 申请信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.sendFriendRequestReq'
      produces:
      - application/json
      responses:
        "201":
          description: 申请发送成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.sendFriendRequestResp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "409":
          description: 已是好友或重复申请
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 发送好友申请
      tags:
      - 好友
  /friend/requests:
    get:
      consumes:
      - application/json
      description: 获取当前用户的待处理好友申请列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  type: object
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 获取好友申请列表
      tags:
      - 好友
  /friend/unblock:
    post:
      consumes:
      - application/json
      description: 将指定用户从黑名单中移除
      parameters:
      - description: 取消拉黑信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.unblockUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 取消拉黑成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 取消拉黑
      tags:
      - 好友
  /group:
    post:
      consumes:
      - application/json
      description: 创建一个新群组，创建者自动成为群主
      parameters:
      - description: 群组信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.createGroupResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 创建群组
      tags:
      - 群组
  /group/{groupID}:
    get:
      consumes:
      - application/json
      description: 根据群组ID获取群组详细信息
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 获取群组信息
      tags:
      - 群组
    put:
      consumes:
      - application/json
      description: 更新群组的名称和公告，仅群主或管理员可操作
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      - description: 更新群组信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 更新群组信息
      tags:
      - 群组
  /group/{groupID}/leave:
    post:
      consumes:
      - application/json
      description: 当前用户退出指定群组，群主不能直接退群（需先转让群主）
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 群主不能退群
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 退出群组
      tags:
      - 群组
  /group/{groupID}/member:
    post:
      consumes:
      - application/json
      description: 向群组添加一名新成员，仅群主或管理员可操作
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      - description: 成员信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.addMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 添加成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "409":
          description: 已是成员或群组已满
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 添加群成员
      tags:
      - 群组
  /group/{groupID}/member/{memberID}:
    delete:
      consumes:
      - application/json
      description: 从群组中移除一名成员；若移除自己则为退群，移除他人则为踢出（仅群主/管理员可踢人）
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      - description: 成员ID
        format: int64
        in: path
        name: memberID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 移除成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 移除群成员
      tags:
      - 群组
  /group/{groupID}/member/{memberID}/role:
    put:
      consumes:
      - application/json
      description: 更新群组成员角色（普通成员/管理员），仅群主可操作
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      - description: 成员ID
        format: int64
        in: path
        name: memberID
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ApiResponse'
        "404":
          description: 群组不存在
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
      summary: 更新成员角色
      tags:
      - 群组
  /group/{groupID}/members:
    get:
      consumes:
      - application/json
      description: 获取指定群组的所有成员信息
      parameters:
      - description: 群组ID
        format: int64
        in: path
        name: groupID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/api.ApiResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ApiResponse'
      security:
      - BearerAuth: []
