server:
  port: 8080
  pprof_port: 0
  ws_path: "/ws"
  upload_dir: "./uploads"

mysql:
  host: "mysql"
  port: 3306
  user: "${MYSQL_USER}"
  password: "${MYSQL_PASSWORD}"
  db_name: "${MYSQL_DATABASE}"

redis:
  addr: "redis:6379"
  password: ""
  db: 0

rabbitmq:
  url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"

jwt:
  secret: "${JWT_SECRET}"
  access_exp_hours: 2
  refresh_exp_days: 7

file:
  max_size_mb: 50
  allowed_exts: ["jpg", "png", "gif", "mp4"]
  upload_dir: "./uploads"

moment:
  big_user_friend_threshold: 500
  timeline_max_len: 1000
  like_persist_batch_size: 200
  like_persist_flush_ms: 500
  like_cache_ttl_hours: 168
