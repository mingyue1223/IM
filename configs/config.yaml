# GoIM Server Configuration
# Copy this file and modify for your environment.
# For E2E testing, use configs/config.test.yaml instead.

server:
  port: 8080              # HTTP server port
  ws_path: "/ws"          # WebSocket endpoint path
  upload_dir: "./uploads" # File upload directory

mysql:
  host: "localhost"
  port: 13306
  user: "goim"
  password: "goim123"     # CHANGE IN PRODUCTION!
  db_name: "goim"

redis:
  addr: "localhost:16379"
  password: ""            # Set password in production!
  db: 0                   # Redis database number (use 1 for E2E tests to avoid collision)

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"  # RabbitMQ AMQP URL

jwt:
  secret: "goim-dev-secret-change-in-production"  # MUST CHANGE IN PRODUCTION! Use ≥32 chars
  access_exp_hours: 2     # Access token lifetime (hours)
  refresh_exp_days: 7     # Refresh token lifetime (days)

llm:
  provider: "deepseek"                     # LLM provider
  api_key: "sk-51YmW8SE8Pf81fqRiUWSsQqECKX2tVDHbaPrs2FGuACx5DQj"
  base_url: "https://api.vectorcontrol.tech"
  model: "deepseek-v4-pro"
  max_tokens: 2048

file:
  max_size_mb: 50                   # Max upload file size (MB)
  allowed_exts: ["jpg", "png", "gif", "mp4"]  # Allowed file extensions
  upload_dir: "./uploads"           # Upload storage directory
